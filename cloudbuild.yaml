steps:
  # 1. Build da imagem
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/cloudinha-conecta-agent', '.']

  # 2. Push para o GCR
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/cloudinha-conecta-agent']

  # 3. Deploy no Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'cloudinha-conecta-agent'
      - '--image'
      - 'gcr.io/$PROJECT_ID/cloudinha-conecta-agent'
      - '--region'
      - 'southamerica-east1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--set-env-vars'
      - 'GOOGLE_API_KEY=$_GOOGLE_API_KEY,SUPABASE_URL=$_SUPABASE_URL,SUPABASE_SERVICE_KEY=$_SUPABASE_SERVICE_KEY,PLANNING_MODEL=$_PLANNING_MODEL,REASONING_MODEL=$_REASONING_MODEL,RESPONSE_MODEL=$_RESPONSE_MODEL,TIMEZONE=$_TIMEZONE,LOG_LEVEL=$_LOG_LEVEL,CORS_ORIGINS=$_CORS_ORIGINS,MCP_SERVER_URL=$_MCP_SERVER_URL'

images:
  - 'gcr.io/$PROJECT_ID/cloudinha-conecta-agent'

options:
  logging: CLOUD_LOGGING
