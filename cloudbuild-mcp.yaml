steps:
  # 1. Build da imagem (pode ser a mesma, mas vamos taguear como mcp)
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/nubo-tools-mcp', '.']

  # 2. Push
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/nubo-tools-mcp']

  # 3. Deploy no Cloud Run (Serviço MCP)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'nubo-tools-mcp'
      - '--image'
      - 'gcr.io/$PROJECT_ID/nubo-tools-mcp'
      - '--region'
      - 'southamerica-east1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      # Comando para iniciar o MCP em vez do Agente
      - '--command'
      - 'python'
      - '--args'
      - 'mcp_launcher.py'
      - '--set-env-vars'
      - 'SUPABASE_URL=$_SUPABASE_URL,SUPABASE_SERVICE_KEY=$_SUPABASE_SERVICE_KEY,LOG_LEVEL=$_LOG_LEVEL'

images:
  - 'gcr.io/$PROJECT_ID/nubo-tools-mcp'

options:
  logging: CLOUD_LOGGING
